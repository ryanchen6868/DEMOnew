<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>灵魂匹配实验室</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
* { font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  min-height: 100vh; color: white; margin: 0; overflow-x: hidden;
}
.glass {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.text-gradient {
  background: linear-gradient(135deg, #c084fc, #f472b6, #22d3ee);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.btn-primary {
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  border: none; color: white; font-weight: 700; cursor: pointer;
  transition: all 0.3s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 40px -10px rgba(139,92,246,0.5); }
.btn-secondary {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.8); font-weight: 700; cursor: pointer;
}
.btn-secondary:hover { background: rgba(255,255,255,0.1); color: white; }
.option-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; padding: 16px; margin-bottom: 10px;
  cursor: pointer; transition: all 0.2s; color: rgba(255,255,255,0.85);
}
.option-card:hover { background: rgba(255,255,255,0.1); border-color: rgba(139,92,246,0.4); transform: translateX(6px); }
.option-card.selected {
  background: linear-gradient(135deg, rgba(139,92,246,0.25), rgba(236,72,153,0.2));
  border-color: #c084fc;
}
.page { display: none; padding: 20px; max-width: 480px; margin: 0 auto; min-height: 100vh; }
.page.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.progress-bar { height: 4px; background: linear-gradient(90deg, #8b5cf6, #ec4899); border-radius: 2px; transition: width 0.4s; }
input[type="text"], input[type="date"] {
  width: 100%; padding: 14px 16px; border-radius: 16px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
  color: white; font-size: 16px; outline: none;
}
input:focus { border-color: #8b5cf6; background: rgba(255,255,255,0.1); }
input[type="date"] { color-scheme: dark; }
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: #10b981; color: white; padding: 12px 24px; border-radius: 999px;
  font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100;
}
.toast.show { opacity: 1; }
.friend-card { animation: slideIn 0.5s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
.emoji-btn {
  font-size: 28px; padding: 8px; border-radius: 16px;
  background: rgba(255,255,255,0.04); border: 2px solid transparent;
  cursor: pointer; filter: grayscale(0.5); transition: all 0.2s;
}
.emoji-btn:hover { transform: scale(1.1); filter: grayscale(0); background: rgba(255,255,255,0.08); }
.emoji-btn.selected { filter: grayscale(0); border-color: #ec4899; background: rgba(236,72,153,0.15); }
.radar-poly { fill: rgba(139,92,246,0.25); stroke: #c084fc; stroke-width: 2; }
</style>
</head>
<body>

// ===================== 页面切换 =====================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===================== 流程入口 =====================
function startCreate() {
  MODE = 'creator';
  document.getElementById('profile-subtitle').textContent = '创建你的灵魂档案';
  showPage('p-profile');
}
function startJoin() {
  const url = new URL(location.href);
  const room = url.searchParams.get('room');
  if (!room) {
    const saved = localStorage.getItem('soulmatch_last_room');
    if (saved && confirm('检测到上次访问的房间 ' + saved + '，是否进入？')) {
      location.search = '?room=' + saved;
      return;
    }
    alert('请让好友发送邀请链接给你，点击链接即可进入！');
    return;
  }
  MODE = 'joiner';
  ROOM = room;
  document.getElementById('profile-subtitle').textContent = '有人想测测和你的默契度';
  // 加载创建者信息
  const data = getMockRoom(ROOM);
  if (data && data.creator) {
    CREATOR_DATA = data.creator;
  }
  showPage('p-profile');
}

function getZodiac(m, d) {
  const signs = [
    {n:'摩羯座',e:'♑',el:'土',po:'阴',dt:[1,19]},{n:'水瓶座',e:'♒',el:'风',po:'阳',dt:[2,18]},
    {n:'双鱼座',e:'♓',el:'水',po:'阴',dt:[3,20]},{n:'白羊座',e:'♈',el:'火',po:'阳',dt:[4,19]},
    {n:'金牛座',e:'♉',el:'土',po:'阴',dt:[5,20]},{n:'双子座',e:'♊',el:'风',po:'阳',dt:[6,21]},
    {n:'巨蟹座',e:'♋',el:'水',po:'阴',dt:[7,22]},{n:'狮子座',e:'♌',el:'火',po:'阳',dt:[8,22]},
    {n:'处女座',e:'♍',el:'土',po:'阴',dt:[9,22]},{n:'天秤座',e:'♎',el:'风',po:'阳',dt:[10,23]},
    {n:'天蝎座',e:'♏',el:'水',po:'阴',dt:[11,21]},{n:'射手座',e:'♐',el:'火',po:'阳',dt:[12,21]},
    {n:'摩羯座',e:'♑',el:'土',po:'阴',dt:[12,31]}
  ];
  for (let s of signs) {
    if (m === s.dt[0] && d <= s.dt[1]) return s;
    if (m === s.dt[0]-1 && d > (signs[signs.indexOf(s)-1]?.dt[1]||0)) return s;
  }
  return signs[0];
}
function getAnimal(y) { return ['猴','鸡','狗','猪','鼠','牛','虎','兔','龙','蛇','马','羊'][y%12]; }
function getStem(y) {
  const stems = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const elems = ['木','木','火','火','土','土','金','金','水','水'];
  return {name:stems[y%10],elem:elems[y%10],full:stems[y%10]+elems[y%10]};
}

function renderQ() {

function selectOpt(idx, val) {
  if (CUR_PART === 2) USER.answers.p2.push(val);
  else if (CUR_PART === 3) USER.answers.p3.push(val);
  else USER.answers.p4.push(val);
  
  CUR_Q++;
  const maxQ = CUR_PART === 2 ? QS.p2.length : (CUR_PART === 3 ? QS.p3.length : QS.p4.length);
  if (CUR_Q >= maxQ) {
    if (CUR_PART < 4) { CUR_PART++; CUR_Q = 0; }
    else { finishQuiz(); return; }
  }
  renderQ();
}

// ===================== 计算逻辑 =====================
function calcMBTI(ans) {
  const sc = {Ni:0,Ne:0,Si:0,Se:0,Ti:0,Te:0,Fi:0,Fe:0};
  ans.forEach(f => sc[f]++);
  const sorted = Object.entries(sc).sort((a,b) => b[1]-a[1]);
  const dom = sorted[0][0], aux = sorted[1][0];
  const map = {'Ni-Te':'INTJ','Te-Ni':'ENTJ','Ni-Fe':'INFJ','Fe-Ni':'ENFJ','Ne-Ti':'ENTP','Ti-Ne':'INTP','Ne-Fi':'ENFP','Fi-Ne':'INFP','Si-Te':'ISTJ','Te-Si':'ESTJ','Si-Fe':'ISFJ','Fe-Si':'ESFJ','Se-Ti':'ISTP','Ti-Se':'ESTP','Se-Fi':'ISFP','Fi-Se':'ESFP'};
  return map[dom+'-'+aux] || 'INTJ';
}
function calcAttach(ans) {
  const anx = ans.slice(0,5).reduce((a,b) => a+b, 0);
  const avd = ans.slice(5,10).reduce((a,b) => a+b, 0);
  const nA = (anx/25)*100, nV = (avd/25)*100;
  let t = 'secure';
  if (nA >= 60 && nV >= 60) t = 'fearful';
  else if (nA >= 60) t = 'anxious';
  else if (nV >= 60) t = 'avoidant';
  return {type:t, anxiety:nA, avoidance:nV};
}
function getStack(type) {
  const s = {INTJ:['Ni','Te','Fi','Se'],ENTJ:['Te','Ni','Se','Fi'],INFJ:['Ni','Fe','Ti','Se'],ENFJ:['Fe','Ni','Se','Ti'],INTP:['Ti','Ne','Si','Fe'],ENTP:['Ne','Ti','Fe','Si'],INFP:['Fi','Ne','Si','Te'],ENFP:['Ne','Fi','Te','Si'],ISTJ:['Si','Te','Fi','Ne'],ESTJ:['Te','Si','Ne','Fi'],ISFJ:['Si','Fe','Ti','Ne'],ESFJ:['Fe','Si','Ne','Ti'],ISTP:['Ti','Se','Ni','Fe'],ESTP:['Se','Ti','Fe','Ni'],ISFP:['Fi','Se','Ni','Te'],ESFP:['Se','Fi','Te','Ni']};
  return s[type];
}

function calcMatch(c, j) {
  // 命运
  const d1 = new Date(c.birth), d2 = new Date(j.birth);
  const z1 = getZodiac(d1.getMonth()+1, d1.getDate()), z2 = getZodiac(d2.getMonth()+1, d2.getDate());
  let zScore = 5;
  if (z1.n === z2.n || z1.el === z2.el) zScore = 25;
  else if ((z1.el==='火'&&z2.el==='风')||(z1.el==='风'&&z2.el==='火')||(z1.el==='水'&&z2.el==='土')||(z1.el==='土'&&z2.el==='水')) zScore = 20;
  else if (z1.po === z2.po) zScore = 10;
  const opps = [['白羊座','天秤座'],['金牛座','天蝎座'],['双子座','射手座'],['巨蟹座','摩羯座'],['狮子座','水瓶座'],['处女座','双鱼座']];
  if (opps.some(([a,b]) => (z1.n===a&&z2.n===b)||(z1.n===b&&z2.n===a))) zScore = 15;
  
  const a1 = d1.getFullYear()%12, a2 = d2.getFullYear()%12;
  const s1 = d1.getFullYear()%10, s2 = d2.getFullYear()%10;
  let cScore = 0;
  const lh = [[0,1],[2,11],[3,10],[4,9],[5,8],[6,7]];
  if (lh.some(([x,y]) => (a1===x&&a2===y)||(a1===y&&a2===x))) cScore = 20;
  const sh = [[0,4,8],[1,5,9],[2,6,10],[3,7,11]];
  if (sh.some(g => g.includes(a1)&&g.includes(a2)&&a1!==a2)) cScore = 15;
  if (Math.abs(s1-s2)===1) cScore = Math.max(cScore, 10);
  const ch = [[0,6],[1,7],[2,8],[3,9],[4,10],[5,11]];
  if (ch.some(([x,y]) => (a1===x&&a2===y)||(a1===y&&a2===x))) cScore = -10;
  const destiny = Math.max(0, Math.min(100, (zScore*0.6 + cScore*0.4)*4));
  
  // MBTI
  let mbti = 55;
  const st1 = getStack(c.mbti), st2 = getStack(j.mbti);
  if (st1 && st2) {
    if (st1[0]===st2[3] && st1[1]===st2[2] && st1[2]===st2[1] && st1[3]===st2[0]) mbti = 95;
    else if ([...new Set(st1)].filter(x => new Set(st2).has(x)).length >= 2) mbti = 80;
    else if (st1[0]===st2[1] && st1[1]===st2[0]) mbti = 75;
    else if ({'Ne':'Si','Si':'Ne','Se':'Ni','Ni':'Se','Te':'Fi','Fi':'Te','Fe':'Ti','Ti':'Fe'}[st1[0]] === st2[0]) mbti = 70;
    else if (c.mbti === j.mbti) mbti = 60;
    else if ([['Te','Fi'],['Fi','Te'],['Fe','Ti'],['Ti','Fe']].some(([a,b]) => st1[0]===a&&st2[0]===b)) mbti = 40;
  }
  
  // 依恋
  const mat = {'secure-secure':100,'secure-anxious':75,'secure-avoidant':65,'secure-fearful':60,'anxious-anxious':45,'avoidant-avoidant':40,'anxious-avoidant':30,'fearful-fearful':35,'anxious-fearful':40,'avoidant-fearful':45};
  const k1 = c.attach+'-'+j.attach, k2 = j.attach+'-'+c.attach;
  let attach = mat[k1] || mat[k2] || 50;
  
  // 习惯
  const w = [1.5,1.5,1.3,1.0,1.5,1.0,1.0,1.3,1.0,1.0];
  let habit = 0, max = 0;
  for (let i=0;i<10;i++) {
    const d = Math.abs(c.answers.p4[i] - j.answers.p4[i]);
    let sc = d===0?10:d===1?7:d===2?3:-2;
    habit += sc*w[i]; max += 10*w[i];
  }
  if (c.answers.p4[4]===j.answers.p4[4] && c.answers.p4[4]===0) habit -= 3;
  if (c.answers.p4[4]===j.answers.p4[4] && c.answers.p4[4]===3) habit -= 5;
  if (Math.abs(c.answers.p4[0]-j.answers.p4[0]) <= 1) habit += 5;
  habit = Math.max(0, Math.min(100, (habit/max)*100));
  
  let total = destiny*0.15 + mbti*0.35 + attach*0.30 + habit*0.20;
  if ((c.attach==='anxious'&&j.attach==='avoidant')||(c.attach==='avoidant'&&j.attach==='anxious')) total -= 18;
  if (c.attach==='fearful'&&j.attach==='fearful') total -= 15;
  if (st1 && st2 && [['Te','Fi'],['Fi','Te'],['Fe','Ti'],['Ti','Fe']].some(([a,b]) => st1[0]===a&&st2[0]===b)) total -= 12;
  
  return {destiny, mbti, attach, habit, total: Math.max(20, Math.min(100, Math.round(total)))};
}

function drawRadar(vals) {
  const labels = ['命运','性格','依恋','习惯'];
  const colors = ['#c084fc','#22d3ee','#f472b6','#fbbf24'];
  const cx = 130, cy = 90, r = 60;
  const ang = i => (Math.PI*2*i/4) - Math.PI/2;
  let grid = '';
  [0.25,0.5,0.75,1].forEach(sc => {
    let pts = '';
    for (let i=0;i<4;i++) { const a=ang(i); pts += (cx+r*sc*Math.cos(a))+','+(cy+r*sc*Math.sin(a))+' '; }
    grid += '<polygon points="'+pts+'" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>';
  });
  for (let i=0;i<4;i++) { const a=ang(i); grid += '<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a))+'" y2="'+(cy+r*Math.sin(a))+'" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>'; }
  document.getElementById('radar-grid').innerHTML = grid;
  
  let poly = '', dots = '', labs = '';
  vals.forEach((v,i) => {
    const a = ang(i), dist = (v/100)*r, x = cx+dist*Math.cos(a), y = cy+dist*Math.sin(a);
    poly += x+','+y+' ';
    dots += '<circle cx="'+x+'" cy="'+y+'" r="4" fill="#ec4899"/>';
    const lx = cx+(r+22)*Math.cos(a), ly = cy+(r+22)*Math.sin(a);
    labs += '<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="middle" fill="'+colors[i]+'" font-size="12" font-weight="bold">'+labels[i]+'</text>';
  });
  document.getElementById('radar-poly').setAttribute('points', poly);
  document.getElementById('radar-dots').innerHTML = dots;
  document.getElementById('radar-labels').innerHTML = labs;
}

function showDetail(j, result) {
  const c = (MODE === 'creator' && getMockRoom(ROOM)) ? getMockRoom(ROOM).creator : USER;
  const html = '<div class="text-center mb-6"><div class="flex justify-center items-center gap-3 mb-4"><div class="text-center"><div class="w-14 h-14 rounded-full glass flex items-center justify-center text-2xl mx-auto mb-1">'+c.name[0]+'</div><div class="text-xs font-bold">'+c.name+'</div></div><div class="text-2xl">💕</div><div class="text-center"><div class="w-14 h-14 rounded-full glass flex items-center justify-center text-2xl mx-auto mb-1">'+j.name[0]+'</div><div class="text-xs font-bold">'+j.name+'</div></div></div><div class="text-6xl font-black text-gradient mb-2">'+result.total+'</div><div class="text-sm text-white/40">详细匹配报告</div></div><div class="space-y-3 mb-6"><div class="glass p-3 flex justify-between"><span class="text-sm text-white/60">✨ 命运缘分</span><span class="font-bold text-purple-300">'+Math.round(result.destiny)+'分</span></div><div class="glass p-3 flex justify-between"><span class="text-sm text-white/60">🧠 性格认知 ('+c.mbti+' vs '+j.mbti+')</span><span class="font-bold text-cyan-300">'+Math.round(result.mbti)+'分</span></div><div class="glass p-3 flex justify-between"><span class="text-sm text-white/60">💕 恋爱人格 ('+getAttachLabel(c.attach)+' vs '+getAttachLabel(j.attach)+')</span><span class="font-bold text-pink-300">'+Math.round(result.attach)+'分</span></div><div class="glass p-3 flex justify-between"><span class="text-sm text-white/60">☕ 生活习惯</span><span class="font-bold text-yellow-300">'+Math.round(result.habit)+'分</span></div></div><div class="glass p-4 text-sm text-white/70 leading-relaxed">'+ (result.total >= 80 ? '这是一段具有长期发展潜力的关系，四个维度协调度都很高。' : result.total >= 60 ? '你们有共鸣也有差异，这正是共同进化的空间。' : '当前组合需要极高的情绪粒度与刻意经营，建议建立冲突修复仪式。') +'</div>';
  document.getElementById('detail-box').innerHTML = html;
  showPage('p-detail');
}

// ===================== 启动 =====================
document.addEventListener('DOMContentLoaded', () => {
  const url = new URL(location.href);
  const room = url.searchParams.get('room');
  if (room) {
    MODE = 'joiner';
    ROOM = room;
    const data = getMockRoom(room);
    if (data && data.creator) CREATOR_DATA = data.creator;
    document.getElementById('profile-subtitle').textContent = '有人想测测和你的默契度';
    showPage('p-profile');
  }
});
</script>
</body>
</html>
